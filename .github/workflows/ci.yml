name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ci:
    name: Julia ${{ matrix.julia-version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        julia-version: ['1']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia-version }}

      - name: Cache Julia artifacts
        uses: julia-actions/cache@v2

      - name: Instantiate src environment
        shell: bash
        run: julia --project=src -e 'using Pkg; Pkg.instantiate()'

      - name: Parse Julia sources (syntax smoke test)
        shell: bash
        run: |
          julia --project=src -e '
            roots = ["src", "analysis", "test"]
            for root in roots
              isdir(root) || continue
              for (dir, _, files) in walkdir(root)
                for file in files
                  endswith(file, ".jl") || continue
                  path = joinpath(dir, file)
                  src = read(path, String)
                  Meta.parseall(src)
                  println("parsed ", path)
                end
              end
            end
          '

      - name: Project smoke check
        shell: bash
        run: julia --project=src -e 'include("src/make_analysis_dataset_sequential.jl"); println("ok")'
